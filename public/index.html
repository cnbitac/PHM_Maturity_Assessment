<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <meta name="theme-color" content="#f97316">
    <title>预测维护成熟度评估</title>
    <link rel="stylesheet" href="/styles.css">
  </head>
  <body>
    <div class="app-shell">
      <header class="app-header">
        <div class="brand-mark" aria-hidden="true">
          <span></span><span></span><span></span>
        </div>
        <div>
          <div class="eyebrow">WAIC 展位快测</div>
          <div class="brand-title">预测维护成熟度评估</div>
        </div>
      </header>

      <main id="app" class="app-main">
        <section class="screen screen-active" data-screen="intro">
          <div class="signal-strip" aria-hidden="true">
            <i style="--h: 38%"></i>
            <i style="--h: 62%"></i>
            <i style="--h: 44%"></i>
            <i style="--h: 78%"></i>
            <i style="--h: 52%"></i>
            <i style="--h: 70%"></i>
          </div>
          <h1>90秒判断：现在该不该做预测维护？</h1>
          <p class="lead">
            基于设备价值、停机影响、数据基础、团队能力四个维度，得到一份现场可解读的行动建议。
          </p>
          <div class="fact-row" aria-label="评估信息">
            <div><strong>12</strong><span>道题</span></div>
            <div><strong>4</strong><span>个维度</span></div>
            <div><strong>1</strong><span>个建议</span></div>
          </div>
          <button class="primary-action" id="startButton" type="button">
            开始评估
          </button>
          <p class="subtle">适合制造企业老板、设备负责人、生产负责人现场快速判断。</p>
        </section>

        <section class="screen" data-screen="lead">
          <div class="screen-heading">
            <span class="step-chip">进入评估</span>
            <h2>留下基本信息</h2>
            <p>仅用于生成本次评估记录和会后沟通，不做无关用途。</p>
          </div>

          <form id="leadForm" class="lead-form" novalidate>
            <label>
              <span>姓名</span>
              <input name="name" autocomplete="name" placeholder="请输入姓名" required>
            </label>
            <label>
              <span>工作单位</span>
              <input name="company" autocomplete="organization" placeholder="请输入公司或工厂名称" required>
            </label>
            <label>
              <span>电话</span>
              <input name="phone" inputmode="tel" autocomplete="tel" placeholder="请输入手机号或座机" required>
            </label>
            <label class="consent-row">
              <input name="consent" type="checkbox" required>
              <span>我同意将以上信息用于本次评估记录和后续专业沟通。</span>
            </label>
            <div class="form-actions">
              <button class="ghost-action" type="button" data-back-intro>返回</button>
              <button class="primary-action" type="submit">进入答题</button>
            </div>
          </form>
        </section>

        <section class="screen" data-screen="quiz">
          <div class="quiz-top">
            <button class="icon-button" type="button" id="questionBackButton" aria-label="上一题">
              <span aria-hidden="true">‹</span>
            </button>
            <div class="progress-wrap" aria-label="答题进度">
              <div class="progress-meta">
                <span id="dimensionLabel">设备价值</span>
                <span id="questionCounter">1 / 12</span>
              </div>
              <div class="progress-track"><div id="progressBar"></div></div>
            </div>
          </div>
          <article class="question-panel">
            <span class="step-chip" id="dimensionPrompt">有没有值得保护的关键设备</span>
            <h2 id="questionTitle">题目加载中</h2>
            <p id="questionHint"></p>
            <div id="optionsList" class="options-list"></div>
          </article>
        </section>

        <section class="screen" data-screen="result">
          <div id="resultCard" class="result-card"></div>
        </section>
      </main>

      <div id="toast" class="toast" role="status" aria-live="polite"></div>
    </div>

    <script src="/assessment.js"></script>
    <script src="/app.js"></script>
  </body>
</html>
